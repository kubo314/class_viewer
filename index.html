<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>次年度クラス</title>
    <style>
        .button {
            width: 80%;
            height: 100px;
            margin-left: 10%;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #888fff;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }
        a {
            text-decoration: none;
        }
        .icon_area {
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
        }
        .icon_area img {
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="icon_area">
        <div style="display: flex;align-items: center;">
        <img src="./icon.jpg" alt="">
        <h3>時間割変更</h3>
        </div>
    </div>
    <br>
    <a href="./registry.html">
        <div class="button">
            自分のクラスを登録する
        </div>
    </a>
    <br>
    <div class="view_class button">
        クラスを見る
    </div>
    <script>
        const random_str = () => {
            // 使いたい文字のセット（例：英大文字・英小文字・数字）
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'

            // 作りたい文字列の長さ
            const length = 10

            // 空の文字列（結果を入れる箱）を用意
            let newPassword = ''

            // length 回くり返す
            for (let i = 0; i < length; i++) {
            // 0〜(charsの長さ-1) の範囲でランダムな整数を作る
            const randomIndex = Math.floor(Math.random() * chars.length)

            // chars からランダムな1文字を取り出す
            const randomChar = chars[randomIndex]

            // 取り出した文字を newPassword に追加する
            newPassword += randomChar
            }

            // 完成したランダム文字列を出力
            return newPassword;
        }
        document.querySelector(".view_class").addEventListener("click", () => {
            window.location =  `./view.html?aaa=${random_str()}`;
        });
    </script>
    </body>
</html>
